dashboard:
  title: "Apseline"
  refreshInterval: 30 # seconds — drives both metrics aggregator and discovery cache

# ── Physical nodes per planet ─────────────────────────────────────────────
# Hostnames should resolve over the tailnet (MagicDNS).
# `host:port` is also the VictoriaMetrics `instance` label used for queries.
nodes:
  perihelion:
    machines:
      - { id: phis1, host: phis1.perihelion.live, role: k8s }
      - { id: phis4, host: phis4.perihelion.live, role: primary }
      # - { id: phis2, host: phis2.perihelion.live, role: cluster }
      # - { id: phis3, host: phis3.perihelion.live, role: cluster }
  aphelion:
    # ahis1 (Hetzner VPS) pushes via vmagent — `host` here must match the
    # `instance` label vmagent rewrites to (see docs/TELEMETRY.md §5).
    # It is NOT a network address the dashboard contacts directly.
    machines:
      - { id: ahis1, host: ahis1.aphelion.live, role: primary }

# ── Integrations ──────────────────────────────────────────────────────────
integrations:
  # Single TSDB hosted on the perihelion baremetal node.
  victoriametrics:
    enabled: true
    url: "http://phis4.perihelion.live:8428"   # or set VM_URL in .env

  # Cloudflare GraphQL Analytics. Token via env: CLOUDFLARE_API_TOKEN
  cloudflare:
    enabled: true
    zones: []   # leave empty to auto-include every zone the token can see

  # nginx integration. See docs/TELEMETRY.md §7 for the two deployment modes.
  #
  # Discovery:
  #   - Baremetal nginx → set `configDir` to a directory of .conf vhost files.
  #   - nginx in k8s    → leave `configDir` unset; the kubernetes integration
  #                       already discovers vhosts from Ingress objects.
  #
  # Metrics: `stub_status` location served on existing nginx ports, fronted
  # by an internal-only hostname (no public DNS).
  nginx:
    enabled: false
    # configDir: "/etc/nginx/conf.d"
    statusUrl: "http://nginx.perihelion.live/nginx_status"
    infrastructure: "perihelion"

  # Cloud-provider stubs. Door open for additional providers.
  cloud:
    gce:
      enabled: false
      project: ""

  # Active HTTP probing of every discovered service.
  health:
    enabled: true
    intervalSeconds: 30
    timeoutMs: 5000

  # Service-discovery integrations (kept from previous setup).
  kubernetes:
    enabled: false
    autoDiscover: false

  docker:
    enabled: false
    autoDiscover: false
    socketPath: "/var/run/docker.sock"

